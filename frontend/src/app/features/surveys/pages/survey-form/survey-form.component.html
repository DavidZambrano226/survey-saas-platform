<div class="container py-4" style="max-width:640px">
  <div class="d-flex align-items-center gap-2 mb-4">
    <a routerLink="/surveys" class="btn btn-sm btn-outline-secondary">← Volver</a>
    <h2 class="mb-0 page-header">{{ isEdit() ? 'Editar encuesta' : 'Nueva encuesta' }}</h2>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="mb-3">
          <label class="form-label fw-semibold">Título *</label>
          <input formControlName="title" class="form-control"
            [class.is-invalid]="titleCtrl.invalid && titleCtrl.touched"
            placeholder="Ej: Encuesta de satisfacción" />
          @if (titleCtrl.invalid && titleCtrl.touched) {
            <div class="invalid-feedback">El título es requerido (mínimo 3 caracteres)</div>
          }
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Descripción</label>
          <textarea formControlName="description" class="form-control" rows="3"
            placeholder="Descripción opcional de la encuesta"></textarea>
        </div>

        @if (isEdit()) {
          <div class="mb-3">
            <label class="form-label fw-semibold">Estado</label>
            <select formControlName="status" class="form-select">
              @for (s of statuses; track s) {
                <option [value]="s">{{ statusLabels[s] }}</option>
              }
            </select>
          </div>

          @if (form.value.status === 'PUBLISHED') {
            <div class="alert alert-success d-flex align-items-center gap-2 py-2">
              <span>🔗 Link público:</span>
              <a [href]="'/survey/' + surveyId()" target="_blank" class="text-truncate">
                {{ '/survey/' + surveyId() }}
              </a>
            </div>
          }
        }

        <div class="d-flex gap-2 justify-content-end">
          <a routerLink="/surveys" class="btn btn-secondary">Cancelar</a>
          <button type="submit" class="btn btn-primary" [disabled]="saving()">
            @if (saving()) { <span class="spinner-border spinner-border-sm me-1"></span> }
            {{ isEdit() ? 'Guardar cambios' : 'Crear encuesta' }}
          </button>
        </div>
      </form>
    </div>
  </div>

  @if (isEdit()) {
    <div class="mt-4">
      <app-question-manager [surveyId]="surveyId()!" />
    </div>
  }
</div>
